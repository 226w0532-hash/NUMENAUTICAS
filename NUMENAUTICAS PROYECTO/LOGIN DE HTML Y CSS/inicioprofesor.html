<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inicio Profesor</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#1d181f,#4d99d8);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:90%;
    max-width:450px;
    background:#fff;
    padding:40px 30px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#22134b;
    margin-bottom:30px;
    font-size:35px;
}

form{
    display:flex;
    flex-direction:column;
    gap:18px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:15px;
    background:#f2f5ff;
    font-size:15px;
}

input:focus{ border:2px solid #4d99d8; }

button{
    background:#59089b;
    color:#fff;
    border:none;
    padding:15px;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

button:hover{ background:#4d99d8; }

.mensaje{
    margin-top:15px;
    text-align:center;
    color:red;
    font-size:14px;
}
</style>
</head>

<body>

<div class="card">

    <h1>INICIAR SESIÓN PROFESOR</h1>

    <form onsubmit="acceder(event)">
        <input type="email" id="correo" placeholder="Correo electrónico" required>
        <input type="password" id="password" placeholder="Contraseña" required>
        <button type="submit">Iniciar sesión</button>
    </form>

    <div class="mensaje" id="mensaje"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBhjF_we0MFxp9RhMkJp1ua-SdQGMQgEN0",
    authDomain: "numenauticas.firebaseapp.com",
    projectId: "numenauticas",
    storageBucket: "numenauticas.firebasestorage.app",
    messagingSenderId: "1004863770387",
    appId: "1:1004863770387:web:632a265055d96f9f5914e6",
    measurementId: "G-3342EKL427"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.acceder = async function(e){

    e.preventDefault();

    const correoIngresado = document.getElementById("correo").value.trim();
    const passwordIngresado = document.getElementById("password").value.trim();
    const mensaje = document.getElementById("mensaje");

    mensaje.innerHTML = "";

    try{

        const consulta = await getDocs(collection(db, "profesores"));

        if(consulta.empty){
            mensaje.innerHTML = "No hay profesores registrados por el administrador.";
            return;
        }

        let profesorEncontrado = null;
        let profesorId = null;

        consulta.forEach(function(documento){

            const profesor = documento.data();

            if(
                profesor.correo === correoIngresado &&
                profesor.password === passwordIngresado
            ){
                profesorEncontrado = profesor;
                profesorId = documento.id;
            }

        });

        if(profesorEncontrado){

            sessionStorage.setItem("profesorActivo", JSON.stringify({
                id: profesorId,
                nombre: profesorEncontrado.nombre,
                correo: profesorEncontrado.correo
            }));

            window.location.href = "contenido.html";

        }else{

            mensaje.innerHTML =
            "Correo o contraseña incorrectos o el profesor no está registrado.";

        }

    }catch(error){

        mensaje.innerHTML = "Error al consultar profesores.";
        console.error(error);

    }
};

</script>

</body>
</html>
