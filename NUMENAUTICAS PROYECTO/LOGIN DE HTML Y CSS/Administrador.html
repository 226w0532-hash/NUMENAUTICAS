<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administrador</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#1d181f,#4d99d8);
    min-height:100vh;
    padding:40px;
}

.contenedor{ max-width:1200px; margin:auto; }

header{
    background:#fff;
    padding:25px;
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

header h1{ color:#22134b; font-size:32px; }

.btn-salir{
    background:#59089b;
    color:#fff;
    border:none;
    padding:12px 25px;
    border-radius:30px;
    cursor:pointer;
}

.btn-salir:hover{ background:#4d99d8; }

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    margin-bottom:40px;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.card h2{
    color:#22134b;
    margin-bottom:15px;
    font-size:25px;
}

.card p{
    color:#555;
    line-height:28px;
    margin-bottom:20px;
}

.card button,
.btn-registrar{
    background:#59089b;
    color:#fff;
    border:none;
    padding:12px 20px;
    border-radius:30px;
    cursor:pointer;
}

.card button:hover,
.btn-registrar:hover{ background:#4d99d8; }

.panel-profesores{
    display:none;
    background:#fff;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
    overflow-x:auto;
}

.panel-profesores h2{
    text-align:center;
    color:#22134b;
    margin-bottom:30px;
}

.formulario{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.formulario-editar{
    display:none;
    background:#f2f5ff;
    padding:25px;
    border-radius:20px;
    margin-bottom:30px;
}

.formulario-editar h3{
    color:#22134b;
    margin-bottom:20px;
    text-align:center;
}

.campo{
    margin-bottom:15px;
}

.campo label{
    display:block;
    font-weight:bold;
    margin-bottom:6px;
    color:#22134b;
}

input, select{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:15px;
    background:#f2f5ff;
    font-size:15px;
}

.formulario-editar input,
.formulario-editar select{
    background:#fff;
}

input:focus,
select:focus{ border:2px solid #4d99d8; }

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:#59089b;
    color:#fff;
    padding:18px;
}

table td{
    padding:18px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

.estado-pendiente{
    color:#d98200;
    font-weight:bold;
}

.estado-verificado{
    color:green;
    font-weight:bold;
}

.btn-editar{
    background:#0b74d1;
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:20px;
    cursor:pointer;
}

.btn-editar:hover{ background:#4d99d8; }

.btn-eliminar,
.btn-cancelar{
    background:#d62828;
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:20px;
    cursor:pointer;
}

.btn-eliminar:hover,
.btn-cancelar:hover{ background:#ff4d4d; }

.btn-guardar{
    background:#198754;
    color:#fff;
    border:none;
    padding:12px 20px;
    border-radius:30px;
    cursor:pointer;
}

.btn-guardar:hover{ background:#28a745; }

.mensaje{
    text-align:center;
    margin-bottom:20px;
    font-weight:bold;
}

@media(max-width:700px){
    body{ padding:20px; }
    header{ flex-direction:column; gap:15px; text-align:center; }
}
</style>
</head>

<body>

<div class="contenedor">

<header>
    <h1>PANEL ADMINISTRADOR</h1>
    <button class="btn-salir" onclick="cerrarSesion()">Cerrar sesión</button>
</header>

<div class="grid">
    <div class="card">
        <h2>Profesores</h2>
        <p>Registrar profesores.</p>
        <button onclick="abrirProfesores()">Entrar</button>
    </div>

    <div class="card">
        <h2>Reportes</h2>
        <p>Visualizar reportes generales del sistema.</p>
        <button onclick="alert('Sección de reportes en desarrollo')">Entrar</button>
    </div>
</div>

<div class="panel-profesores" id="panelProfesores">

    <h2>REGISTRO DE PROFESORES</h2>

    <p class="mensaje" id="mensaje"></p>

    <div class="formulario">
        <input type="text" id="nombre" placeholder="Nombre del profesor">
        <input type="email" id="correo" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña mínimo 6 caracteres">

        <button class="btn-registrar" onclick="registrarProfesor()">
            Registrar Profesor
        </button>
    </div>

    <div class="formulario-editar" id="formularioEditarProfesor">
        <h3>EDITAR PROFESOR</h3>

        <input type="hidden" id="editarIdProfesor">

        <div class="campo">
            <label>Nombre del profesor</label>
            <input type="text" id="editarNombreProfesor" placeholder="Nombre del profesor">
        </div>

        <div class="campo">
            <label>Correo electrónico</label>
            <input type="email" id="editarCorreoProfesor" placeholder="Correo electrónico">
        </div>

        <div class="campo">
            <label>Rol</label>
            <select id="editarRolProfesor">
                <option value="profesor">Profesor</option>
                <option value="administrador">Administrador</option>
            </select>
        </div>

        <div class="campo">
            <label>Estado del correo</label>
            <select id="editarEstadoProfesor">
                <option value="Pendiente">Pendiente</option>
                <option value="Verificado">Verificado</option>
            </select>
        </div>

        <button class="btn-guardar" onclick="guardarEdicionProfesor()">
            Guardar cambios
        </button>

        <button class="btn-cancelar" onclick="cancelarEdicionProfesor()">
            Cancelar
        </button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Rol</th>
                <th>Estado del correo</th>
                <th>Editar</th>
                <th>Borrar</th>
            </tr>
        </thead>

        <tbody id="tablaProfesores">
            <tr>
                <td colspan="6">Cargando profesores registrados...</td>
            </tr>
        </tbody>
    </table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
    getAuth,
    createUserWithEmailAndPassword,
    updateProfile,
    sendEmailVerification,
    signOut
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
    getFirestore,
    doc,
    setDoc,
    collection,
    getDocs,
    getDoc,
    updateDoc,
    deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBhjF_we0MFxp9RhMkJp1ua-SdQGMQgEN0",
    authDomain: "numenauticas.firebaseapp.com",
    projectId: "numenauticas",
    storageBucket: "numenauticas.firebasestorage.app",
    messagingSenderId: "1004863770387",
    appId: "1:1004863770387:web:632a265055d96f9f5914e6",
    measurementId: "G-3342EKL427"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.abrirProfesores = function(){
    const panel = document.getElementById("panelProfesores");

    if(panel.style.display === "block"){
        panel.style.display = "none";
    }else{
        panel.style.display = "block";
        mostrarProfesores();
    }
};

window.registrarProfesor = async function(){

    const nombre = document.getElementById("nombre").value.trim();
    const correo = document.getElementById("correo").value.trim();
    const password = document.getElementById("password").value.trim();
    const mensaje = document.getElementById("mensaje");

    mensaje.textContent = "";

    if(nombre === "" || correo === "" || password === ""){
        mensaje.style.color = "red";
        mensaje.textContent = "Completa todos los campos.";
        return;
    }

    if(password.length < 6){
        mensaje.style.color = "red";
        mensaje.textContent = "La contraseña debe tener mínimo 6 caracteres.";
        return;
    }

    try{

        const credencial = await createUserWithEmailAndPassword(
            auth,
            correo,
            password
        );

        await updateProfile(credencial.user, {
            displayName: nombre
        });

        await sendEmailVerification(credencial.user);

        await setDoc(doc(db, "profesores", credencial.user.uid), {
            uid: credencial.user.uid,
            nombre: nombre,
            correo: correo,
            rol: "profesor",
            estadoCorreo: "Pendiente",
            fechaRegistro: new Date().toLocaleString()
        });

        document.getElementById("nombre").value = "";
        document.getElementById("correo").value = "";
        document.getElementById("password").value = "";

        mensaje.style.color = "green";
        mensaje.textContent = "Profesor registrado correctamente. Se envió correo de verificación.";

        mostrarProfesores();

    }catch(error){

        mensaje.style.color = "red";

        if(error.code === "auth/email-already-in-use"){
            mensaje.textContent = "Este correo ya está registrado.";
        }else if(error.code === "auth/invalid-email"){
            mensaje.textContent = "Correo electrónico no válido.";
        }else if(error.code === "auth/weak-password"){
            mensaje.textContent = "La contraseña es muy débil.";
        }else{
            mensaje.textContent = "Error al registrar profesor.";
        }

        console.error(error);
    }
};

async function mostrarProfesores(){

    const tabla = document.getElementById("tablaProfesores");
    tabla.innerHTML = "";

    try{

        const consulta = await getDocs(collection(db, "profesores"));

        if(consulta.empty){
            tabla.innerHTML = `
                <tr>
                    <td colspan="6">No hay profesores registrados.</td>
                </tr>
            `;
            return;
        }

        consulta.forEach(function(documento){

            const profesor = documento.data();

            let claseEstado = "estado-pendiente";

            if(profesor.estadoCorreo === "Verificado"){
                claseEstado = "estado-verificado";
            }

            tabla.innerHTML += `
                <tr>
                    <td>${profesor.nombre || "Sin nombre"}</td>
                    <td>${profesor.correo || "Sin correo"}</td>
                    <td>${profesor.rol || "profesor"}</td>
                    <td class="${claseEstado}">
                        ${profesor.estadoCorreo || "Pendiente"}
                    </td>
                    <td>
                        <button class="btn-editar" onclick="editarProfesor('${documento.id}')">
                            Editar
                        </button>
                    </td>
                    <td>
                        <button class="btn-eliminar" onclick="eliminarProfesor('${documento.id}')">
                            Borrar
                        </button>
                    </td>
                </tr>
            `;

        });

    }catch(error){

        tabla.innerHTML = `
            <tr>
                <td colspan="6">Error al cargar profesores registrados.</td>
            </tr>
        `;

        console.error(error);
    }
}

window.editarProfesor = async function(id){

    const mensaje = document.getElementById("mensaje");

    try{

        const referencia = doc(db, "profesores", id);
        const documento = await getDoc(referencia);

        if(!documento.exists()){
            mensaje.style.color = "red";
            mensaje.textContent = "No se encontró el profesor.";
            return;
        }

        const profesor = documento.data();

        document.getElementById("formularioEditarProfesor").style.display = "block";

        document.getElementById("editarIdProfesor").value = id;
        document.getElementById("editarNombreProfesor").value = profesor.nombre || "";
        document.getElementById("editarCorreoProfesor").value = profesor.correo || "";
        document.getElementById("editarRolProfesor").value = profesor.rol || "profesor";
        document.getElementById("editarEstadoProfesor").value = profesor.estadoCorreo || "Pendiente";

        mensaje.textContent = "";

    }catch(error){

        mensaje.style.color = "red";
        mensaje.textContent = "Error al abrir el formulario de edición.";
        console.error(error);

    }
};

window.guardarEdicionProfesor = async function(){

    const id = document.getElementById("editarIdProfesor").value;
    const nombre = document.getElementById("editarNombreProfesor").value.trim();
    const correo = document.getElementById("editarCorreoProfesor").value.trim();
    const rol = document.getElementById("editarRolProfesor").value;
    const estadoCorreo = document.getElementById("editarEstadoProfesor").value;
    const mensaje = document.getElementById("mensaje");

    if(nombre === "" || correo === "" || rol === "" || estadoCorreo === ""){
        mensaje.style.color = "red";
        mensaje.textContent = "Completa todos los campos antes de guardar.";
        return;
    }

    try{

        await updateDoc(doc(db, "profesores", id), {
            nombre: nombre,
            correo: correo,
            rol: rol,
            estadoCorreo: estadoCorreo,
            fechaActualizacion: new Date().toLocaleString()
        });

        mensaje.style.color = "green";
        mensaje.textContent = "Profesor actualizado correctamente en Firestore.";

        document.getElementById("formularioEditarProfesor").style.display = "none";

        mostrarProfesores();

    }catch(error){

        mensaje.style.color = "red";
        mensaje.textContent = "Error al guardar los cambios del profesor.";
        console.error(error);

    }
};

window.cancelarEdicionProfesor = function(){
    document.getElementById("formularioEditarProfesor").style.display = "none";
    document.getElementById("mensaje").textContent = "";
};

window.eliminarProfesor = async function(id){

    const confirmar = confirm("¿Seguro que deseas borrar este profesor de la tabla?");

    if(!confirmar){
        return;
    }

    try{

        await deleteDoc(doc(db, "profesores", id));

        alert("Profesor eliminado de la tabla.");
        mostrarProfesores();

    }catch(error){

        alert("Error al borrar profesor.");
        console.error(error);

    }
};

window.cerrarSesion = async function(){
    try{
        await signOut(auth);
    }catch(error){
        console.error(error);
    }

    window.location.href = "index.html";
};

mostrarProfesores();

</script>

</body>
</html>
