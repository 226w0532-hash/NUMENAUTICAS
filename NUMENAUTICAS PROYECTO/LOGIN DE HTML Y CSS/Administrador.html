<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administrador</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#1d181f,#4d99d8);
    min-height:100vh;
    padding:40px;
}

.contenedor{ max-width:1200px; margin:auto; }

header{
    background:#fff;
    padding:25px;
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

header h1{ color:#22134b; font-size:32px; }

.btn-salir{
    background:#59089b;
    color:#fff;
    border:none;
    padding:12px 25px;
    border-radius:30px;
    cursor:pointer;
    transition:.3s;
}

.btn-salir:hover{ background:#4d99d8; }

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    margin-bottom:40px;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
    transition:.3s;
}

.card:hover{ transform:translateY(-5px); }

.card h2{
    color:#22134b;
    margin-bottom:15px;
    font-size:25px;
}

.card p{
    color:#555;
    line-height:28px;
    margin-bottom:20px;
}

.card button{
    background:#59089b;
    color:#fff;
    border:none;
    padding:12px 20px;
    border-radius:30px;
    cursor:pointer;
    transition:.3s;
}

.card button:hover{ background:#4d99d8; }

.panel-profesores{
    display:none;
    background:#fff;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
    overflow-x:auto;
}

.panel-profesores h2{
    text-align:center;
    color:#22134b;
    margin-bottom:30px;
}

.formulario{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:15px;
    background:#f2f5ff;
    font-size:15px;
}

input:focus{ border:2px solid #4d99d8; }

.btn-registrar{
    background:#59089b;
    color:#fff;
    border:none;
    padding:15px;
    border-radius:30px;
    cursor:pointer;
    transition:.3s;
}

.btn-registrar:hover{ background:#4d99d8; }

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:#59089b;
    color:#fff;
    padding:18px;
}

table td{
    padding:18px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

.btn-eliminar{
    background:#d62828;
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:20px;
    cursor:pointer;
}

.btn-eliminar:hover{ background:#ff4d4d; }

.mensaje{
    text-align:center;
    margin-bottom:20px;
    font-weight:bold;
}

@media(max-width:700px){
    body{ padding:20px; }
    header{ flex-direction:column; gap:15px; text-align:center; }
}
</style>
</head>

<body>

<div class="contenedor">

<header>
    <h1>PANEL ADMINISTRADOR</h1>
    <button class="btn-salir" onclick="cerrarSesion()">Cerrar sesión</button>
</header>

<div class="grid">

    <div class="card">
        <h2>Profesores</h2>
        <p>Registrar y administrar profesores del sistema.</p>
        <button onclick="abrirProfesores()">Entrar</button>
    </div>

    <div class="card">
        <h2>Reportes</h2>
        <p>Visualizar reportes generales del sistema.</p>
        <button onclick="alert('Sección de reportes en desarrollo')">Entrar</button>
    </div>

</div>

<div class="panel-profesores" id="panelProfesores">

    <h2>REGISTRO DE PROFESORES</h2>

    <p class="mensaje" id="mensaje"></p>

    <div class="formulario">

        <input type="text" id="nombre" placeholder="Nombre del profesor">

        <input type="email" id="correo" placeholder="Correo electrónico">

        <input type="password" id="password" placeholder="Contraseña">

        <button class="btn-registrar" onclick="registrarProfesor()">
            Registrar Profesor
        </button>

    </div>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Contraseña</th>
                <th>Eliminar</th>
            </tr>
        </thead>

        <tbody id="tablaProfesores"></tbody>
    </table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc,
    query,
    where
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBhjF_we0MFxp9RhMkJp1ua-SdQGMQgEN0",
    authDomain: "numenauticas.firebaseapp.com",
    projectId: "numenauticas",
    storageBucket: "numenauticas.firebasestorage.app",
    messagingSenderId: "1004863770387",
    appId: "1:1004863770387:web:632a265055d96f9f5914e6",
    measurementId: "G-3342EKL427"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.abrirProfesores = function(){
    const panel = document.getElementById("panelProfesores");

    if(panel.style.display === "block"){
        panel.style.display = "none";
    }else{
        panel.style.display = "block";
    }
};

window.registrarProfesor = async function(){

    const nombre = document.getElementById("nombre").value.trim();
    const correo = document.getElementById("correo").value.trim();
    const password = document.getElementById("password").value.trim();
    const mensaje = document.getElementById("mensaje");

    mensaje.textContent = "";

    if(nombre === "" || correo === "" || password === ""){
        mensaje.style.color = "red";
        mensaje.textContent = "Completa todos los campos.";
        return;
    }

    try{

        const consulta = query(
            collection(db, "profesores"),
            where("correo", "==", correo)
        );

        const resultado = await getDocs(consulta);

        if(!resultado.empty){
            mensaje.style.color = "red";
            mensaje.textContent = "Ese profesor ya existe.";
            return;
        }

        await addDoc(collection(db, "profesores"), {
            nombre: nombre,
            correo: correo,
            password: password,
            fechaRegistro: new Date().toLocaleString()
        });

        document.getElementById("nombre").value = "";
        document.getElementById("correo").value = "";
        document.getElementById("password").value = "";

        mensaje.textContent = "";

        mostrarProfesores();

    }catch(error){

        mensaje.style.color = "red";
        mensaje.textContent = "Error al registrar profesor.";
        console.error(error);

    }
};

async function mostrarProfesores(){

    const tabla = document.getElementById("tablaProfesores");

    tabla.innerHTML = "";

    try{

        const consulta = await getDocs(collection(db, "profesores"));

        if(consulta.empty){

            tabla.innerHTML = `
                <tr>
                    <td colspan="4">No hay profesores registrados.</td>
                </tr>
            `;

            return;
        }

        consulta.forEach(function(documento){

            const profesor = documento.data();
            const id = documento.id;

            tabla.innerHTML += `
                <tr>
                    <td>${profesor.nombre}</td>
                    <td>${profesor.correo}</td>
                    <td>${profesor.password}</td>
                    <td>
                        <button class="btn-eliminar" onclick="eliminarProfesor('${id}')">
                            Eliminar
                        </button>
                    </td>
                </tr>
            `;

        });

    }catch(error){

        tabla.innerHTML = `
            <tr>
                <td colspan="4">Error al cargar profesores.</td>
            </tr>
        `;

        console.error(error);

    }
}

window.eliminarProfesor = async function(id){

    const confirmar = confirm("¿Seguro que deseas eliminar este profesor?");

    if(confirmar){

        try{

            await deleteDoc(doc(db, "profesores", id));

            document.getElementById("mensaje").textContent = "";

            mostrarProfesores();

        }catch(error){

            document.getElementById("mensaje").style.color = "red";
            document.getElementById("mensaje").textContent =
            "Error al eliminar profesor.";

            console.error(error);

        }

    }
};

window.cerrarSesion = function(){
    window.location.href = "Principal.html";
};

mostrarProfesores();

</script>

</body>
</html>
