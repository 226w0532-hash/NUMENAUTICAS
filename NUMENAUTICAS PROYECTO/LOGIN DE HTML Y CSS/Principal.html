<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Principal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
    radial-gradient(circle at top,#5f2cff,#1b1035 40%,#090014 100%);
}

.estrellas{
    position:fixed;
    width:100%;
    height:100%;
    background-image:
    radial-gradient(white 1px,transparent 1px),
    radial-gradient(white 1px,transparent 1px),
    radial-gradient(#ffd700 1px,transparent 1px);
    background-size:80px 80px,120px 120px,160px 160px;
    animation:mover 20s linear infinite;
    opacity:.7;
}

@keyframes mover{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(100px);
    }

}

.card{
    position:relative;
    z-index:2;
    width:90%;
    max-width:550px;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.2);
    padding:40px 30px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 10px 35px rgba(0,0,0,.4);
}

h1{
    color:#fff;
    font-size:50px;
    margin-bottom:10px;
    text-shadow:0 0 15px #8fd3ff;
}

p{
    color:#f2f2f2;
    font-size:18px;
    margin-bottom:30px;
}

.botones{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.opcion{
    width:200px;
    background:rgba(255,255,255,.15);
    border-radius:25px;
    padding:25px 20px;
    transition:.3s;
    border:1px solid rgba(255,255,255,.2);
}

.opcion:hover{
    transform:translateY(-8px) scale(1.03);
    background:rgba(255,255,255,.25);
}

.opcion img{
    width:90px;
    margin-bottom:15px;
}

.opcion h2{
    color:white;
    margin-bottom:15px;
}

.boton{
    display:inline-block;
    text-decoration:none;
    background:#7b2cff;
    color:white;
    padding:12px 25px;
    border-radius:30px;
    transition:.3s;
}

.boton:hover{
    background:#44b6ff;
}

@media(max-width:600px){

    h1{
        font-size:38px;
    }

    .opcion{
        width:100%;
    }

}

</style>
</head>

<body>

<div class="estrellas"></div>

<div class="card">

<h1>Númenauticas</h1>

<p>
Iniciar sesión<br>
¿Quién eres?
</p>

<div class="botones">

<!-- ADMINISTRADOR -->

<div class="opcion">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<h2>Administrador</h2>

<a href="inicionsesionAdmi.html" class="boton">
Entrar
</a>

</div>

<!-- PROFESOR -->

<div class="opcion">

<img src="https://cdn-icons-png.flaticon.com/512/1995/1995574.png">

<h2>Profesor</h2>

<a href="inicioprofesor.html" class="boton">
Entrar
</a>

</div>

</div>

</div>

</body>
</html>
