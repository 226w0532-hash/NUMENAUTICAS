<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="formulario">

    <h1>Registro de Alumno</h1>

    <form id="formRegistro">

        <div class="username">
            <input type="text" id="nombre" required>
            <label>Nombre</label>
            <span></span>
        </div>

        <div class="username">
            <input type="text" id="apellidos" required>
            <label>Apellidos</label>
            <span></span>
        </div>

        <div class="username">
            <input type="email" id="correo" required>
            <label>Correo</label>
            <span></span>
        </div>

        <div class="username">
            <input type="text" id="claveInstitucion" required>
            <label>Clave Institución</label>
            <span></span>
        </div>

        <div class="username">
            <select id="grado" required>
                <option value="" disabled selected></option>
                <option value="1">1° Grado</option>
                <option value="2">2° Grado</option>
                <option value="3">3° Grado</option>
                <option value="4">4° Grado</option>
                <option value="5">5° Grado</option>
                <option value="6">6° Grado</option>
            </select>
            <label>Grado</label>
            <span></span>
        </div>

        <div class="username">
            <input type="text" id="grupo" required>
            <label>Grupo</label>
            <span></span>
        </div>

        <div class="username">
            <input type="number" id="anio" required>
            <label>Año de registro</label>
            <span></span>
        </div>

        <input type="submit" value="Registrar">

        <div class="registrarse">
            <a href="contenido.html" class="back-to-top">Volver</a>
        </div>

        <p id="mensaje" style="text-align:center;"></p>

    </form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    query,
    where
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBhjF_we0MFxp9RhMkJp1ua-SdQGMQgEN0",
    authDomain: "numenauticas.firebaseapp.com",
    projectId: "numenauticas",
    storageBucket: "numenauticas.firebasestorage.app",
    messagingSenderId: "1004863770387",
    appId: "1:1004863770387:web:632a265055d96f9f5914e6",
    measurementId: "G-3342EKL427"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("formRegistro").addEventListener("submit", async function(e){

    e.preventDefault();

    let nombre = document.getElementById("nombre").value.trim();
    let apellidos = document.getElementById("apellidos").value.trim();
    let correo = document.getElementById("correo").value.trim();
    let claveInstitucion = document.getElementById("claveInstitucion").value.trim();
    let grado = document.getElementById("grado").value;
    let grupo = document.getElementById("grupo").value.trim();
    let anio = document.getElementById("anio").value;
    let mensaje = document.getElementById("mensaje");

    if(anio < 1900 || anio > 2026){
        mensaje.style.color = "red";
        mensaje.innerHTML = "El año debe estar entre 1900 y 2026.";
        return;
    }

    let primerNombre = nombre.split(" ")[0].toLowerCase();
    let inicialApellido = apellidos[0].toLowerCase();

    let usuario = primerNombre + inicialApellido + anio;
    let password = anio;

    try{

        const consulta = query(
            collection(db, "alumnos"),
            where("correo", "==", correo)
        );

        const resultado = await getDocs(consulta);

        if(!resultado.empty){
            mensaje.style.color = "red";
            mensaje.innerHTML = "Este correo ya está registrado.";
            return;
        }

        await addDoc(collection(db, "alumnos"), {
            nombre: nombre,
            apellidos: apellidos,
            correo: correo,
            claveInstitucion: claveInstitucion,
            grado: grado,
            grupo: grupo,
            anio: anio,
            usuario: usuario,
            password: password,
            rol: "estudiante",
            fechaRegistro: new Date().toLocaleString()
        });

        mensaje.style.color = "green";
        mensaje.innerHTML =
            "Alumno registrado correctamente en Cloud Firestore<br><br>" +
            "Correo: <b>" + correo + "</b><br>" +
            "Usuario: <b>" + usuario + "</b><br>" +
            "Contraseña: <b>" + password + "</b><br><br>" +
            "El alumno ya puede iniciar sesión en la plataforma.";

        document.getElementById("formRegistro").reset();

    }catch(error){

        mensaje.style.color = "red";
        mensaje.innerHTML = "Error al registrar alumno: " + error.message;
        console.error(error);

    }

});

</script>

</body>
</html>
